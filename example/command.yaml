# !yaml-language-server: $schema=https://carapace.sh/schemas/command.json
# ANCHOR: command
name: command
commands:
# ANCHOR_END: command

# ANCHOR: name
- name: name
# ANCHOR_END: name

# ANCHOR: usage
- name: usage [-F file | -D dir]... [-f format] profile 
# ANCHOR_END: usage

# ANCHOR: description
- name: description
  description: with description
# ANCHOR_END: description

# ANCHOR: group
- name: group
  group: with group
# ANCHOR_END: group

# ANCHOR: aliases
- name: aliases
  aliases: [a, al]
# ANCHOR_END: aliases

# ANCHOR: hidden
- name: hidden
  hidden: true
  completion:
    positional:
    - [p1, positional1]
# ANCHOR_END: hidden

# ANCHOR: parsing
- name: parsing
  commands:
  - name: interspersed
    parsing: interspersed
    flags:
      --bool: bool flag
      --string=: string flag
    completion:
      flag:
        string: [s1, s2, s3]
      positional:
      - [p1, positional1]
      dash:
      - [d1, dash1]
  
  - name: non-interspersed
    parsing: non-interspersed
    flags:
      --bool: bool flag
      --string=: string flag
    completion:
      flag:
        string: [s1, s2, s3]
      positional:
      - [p1, positional1]

  - name: disabled
    parsing: disabled
    flags:
      --bool: bool flag
      --string=: string flag
    completion:
      flag:
        string: [s1, s2, s3]
      positional:
      - [p1, positional1]
# ANCHOR_END: parsing

# ANCHOR: flags
- name: flags
  flags:
    -b: bool flag
    -v=: shorthand with value
    --repeatable*: longhand repeatable
    -o, --optarg?: shorthand and longhand with optional argument
    --hidden&: longhand hidden
    --required!: longhand required    
# ANCHOR_END: flags

# ANCHOR: nonposix
- name: nonposix
  flags:
    -np: non-posix shorthand
    -np, -nonposix:  non-posix shorthand and longhand
    -np, --nonposix: non-posix shorthand mixed with posix longhand    
# ANCHOR_END: nonposix

- name: persistentflags
  persistentflags:
    --bool: bool flag
    --string=: string flag
  completion:
    flag:
      string: [s1, s2, s3]
  commands:
  - name: subcommand

# ANCHOR: persistentflags
- name: persistentflags
  persistentflags:
    -p, --persistent: persistent flag
  commands:
    - name: child
      flags:
        -l, --local: local flag
# ANCHOR_END: persistentflags

# ANCHOR: exclusiveflags
- name: exclusiveflags
  flags:
    --add: add package
    --delete: delete package
  exclusiveflags:
    - [add, delete]
# ANCHOR: exclusiveflags

# ANCHOR_END: exclusiveflags

- name: run
  commands:
  - name: alias
    run: "[git, log]"
  - name: shell
    run: "$(git log --color=${C_FLAG_COLOR:-auto} $@)"
    flags:
      --color?: colored diff
    completion:
      flag:
        color: [always, auto, never]
      positional:
      -  [master]
