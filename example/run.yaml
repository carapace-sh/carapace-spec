name: run
commands:
  - name: alias
    commands:
      - name: string
        run: "[git, log]"

      - name: array
        run: [git, log]

  - name: script
    commands:
      - name: macro
        run: "$(git log $1)" # TODO: support modifiers -  run: "$fish(pwd) ||| $chdir(/tmp)"        
        completion:
          positional:
            - ["$files"]

      - name: shebang
        run: |
          #!/usr/bin/env bash
          git log $1
        completion:
          positional:
            - ["$files"]
